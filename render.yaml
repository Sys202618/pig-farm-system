---
# Render.com 部署配置
# 使用 PostgreSQL 插件，自动设置 DATABASE_URL
# Docs: https://render.com/docs/deploy-python-flask

services:
  - type: web
    name: pig-farm-system
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    plan: free
    region: singapore
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: FLASK_ENV
        value: production

databases:
  - name: pig-farm-db
    plan: free
    region: singapore
